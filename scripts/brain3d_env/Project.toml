# ============================================================================
#  brain3d_env — isolated environment for 3D brain visualization
#
#  Kept separate from the main NeuroTrace package so that GLMakie and its
#  Makie ecosystem dependencies do NOT bleed into the 2D-plotting scripts
#  (which use Plots.jl / GR).  Mixing both backends in one environment
#  causes `plot` / `load` name conflicts in Julia 1.12.
#
#  First-time setup (run once from this folder):
#      julia --project=. -e 'using Pkg; Pkg.instantiate()'
#
#  Afterwards just run:
#      julia scripts/Brain3D.jl
# ============================================================================

[deps]
# 3D rendering
GLMakie = "e9467ef8-e4e7-5192-8a1a-b1aee30e663a"
Colors  = "5ae59095-9a9b-59fe-a467-6f913c188581"

# Mesh loading (.obj files)
FileIO  = "5789e2e9-d7fb-5bc7-8068-2c6fae9b9549"

# NWB / HDF5 reading (mirrors NeuroTrace's IO layer, included directly)
HDF5    = "f67ccb44-e63f-5c2f-98bd-6dc0ccc4ba2f"

# TOML and Statistics are Julia stdlib — no UUID needed, but listed for clarity
TOML       = "fa267f1f-6049-4f14-aa54-33bafae1ed76"
Statistics = "10745b16-79ce-11e8-11f9-7d13ad32a3b2"

[compat]
julia   = "1.9"
GLMakie = "0.10, 0.11, 0.12"
Colors  = "0.12, 0.13, 0.14, 0.15"
FileIO  = "0.9, 1"
HDF5    = "0.17"
